name: Release

"on":
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS universal binary
        run: bash scripts/build-macos-universal.sh

      - name: Package as zip
        run: |
          cd build/bin
          zip -r "DevTools-macOS-${{ github.ref_name }}.zip" DevTools.app
          mv "DevTools-macOS-${{ github.ref_name }}.zip" ../..

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: "DevTools-macOS-${{ github.ref_name }}.zip"
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows executable
        run: wails build -webview2 embed -ldflags "-s -w -H windowsgui"

      - name: Package as zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $pkg = "dist/dev-tools-portable"
          New-Item -ItemType Directory -Force -Path "$pkg/data"
          Copy-Item "build/bin/dev-tools.exe" "$pkg/"
          @"
          DevTools - 开发常用小工具集 $version

          使用方法：
          1. 解压此 zip 文件到任意目录
          2. 双击 dev-tools.exe 运行
          3. 数据文件保存在 exe 同目录下的 data/ 目录

          包含工具：
          - JSON 格式化（格式化/压缩/验证）
          - Base64 编解码（文本/文件模式）
          - 时间戳转换（双向转换+多时区）
          - YAML 格式化（格式化/验证/转JSON）
          - XML 格式化（格式化/压缩/验证）
          - 随机字符串生成
          - Cron 表达式解析
          - URL 编解码（编码/解码/Query参数解析）
          - Hash 摘要（MD5/SHA1/SHA256/SHA512）
          - JWT 解析
          - UUID 工具（生成/验证）
          - 正则测试（匹配/替换）

          注意：
          - Windows 10/11 已自带 WebView2 runtime
          - 如果系统缺少 WebView2，首次运行会自动引导安装
          - 无需安装，无需注册表，解压即用
          "@ | Out-File -FilePath "$pkg/README.txt" -Encoding UTF8
          Compress-Archive -Path "$pkg/*" -DestinationPath "DevTools-Windows-$version.zip"
          Move-Item "DevTools-Windows-$version.zip" "DevTools-Windows-${{ github.ref_name }}.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "DevTools-Windows-${{ github.ref_name }}.zip"
          if-no-files-found: error

  build-linux:
    name: Build Linux (deb + rpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux binary
        run: wails build -ldflags "-s -w"

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Package .deb and .rpm
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          mkdir -p dist/linux
          cp build/bin/dev-tools dist/linux/

          # Create .desktop entry
          cat > dist/linux/dev-tools.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=DevTools
          Comment=开发常用小工具集
          Exec=/usr/local/bin/dev-tools
          Icon=dev-tools
          Type=Application
          Categories=Development;Utility;
          DESKTOP

          # Create nfpm config
          cat > dist/nfpm.yaml << NFPM
          name: dev-tools
          arch: amd64
          version: ${VERSION}
          maintainer: Chauncey
          description: DevTools - 开发常用小工具集（JSON/Base64/时间戳/YAML/XML/随机字符串/Cron/URL/Hash/JWT/UUID/正则）
          homepage: https://github.com/chaunceychan/dev-tools
          license: MIT
          contents:
            - src: dist/linux/dev-tools
              dst: /usr/local/bin/dev-tools
            - src: dist/linux/dev-tools.desktop
              dst: /usr/share/applications/dev-tools.desktop
            - src: dev_tool_logo_48x48.png
              dst: /usr/share/icons/hicolor/48x48/apps/dev-tools.png
          NFPM

          nfpm package -p deb -f dist/nfpm.yaml -t dist/
          nfpm package -p rpm -f dist/nfpm.yaml -t dist/

          mv dist/dev-tools_${VERSION}_amd64.deb "DevTools-Linux-${{ github.ref_name }}.deb"
          mv dist/dev-tools-${VERSION}-1.x86_64.rpm "DevTools-Linux-${{ github.ref_name }}.rpm"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "DevTools-Linux-${{ github.ref_name }}.deb"
          if-no-files-found: error

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: "DevTools-Linux-${{ github.ref_name }}.rpm"
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-app

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: Download Linux .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb

      - name: Download Linux .rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-rpm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            DevTools-macOS-${{ github.ref_name }}.zip
            DevTools-Windows-${{ github.ref_name }}.zip
            DevTools-Linux-${{ github.ref_name }}.deb
            DevTools-Linux-${{ github.ref_name }}.rpm
          generate_release_notes: true
